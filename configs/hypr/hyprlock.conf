# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

source = $HOME/.config/hypr/colors.conf

$fn_greet=echo " vic"

$font4 = RecMonoCasual Nerd Font Mono
$font2 = Drop Shade Outlined
$font3 = Fast Hand

general {
    hide_cursor = true
    ignore_empty_input = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = $HOME/.config/niri/user/scripts/.wallpaper_current
    blur_radius = 3
    blur_passes = 2
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.25) # no fill

    outer_color = $outline
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = $on_primary_container
    fade_on_empty = false
    rounding = 40

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -400
    halign = center
    valign = center
}

shape {
	size = 20%, 5%
	position = 0, -300
	halign = center
	valign = center
	color = rgba(0, 0, 0, 0.25)
	rounding = 40
	border_size = 3
	border_color = $outline
	}


label {
	text = cmd[update:60000] $fn_greet
	color = $on_primary_container
	font_family = $font4
	font_size = 30
	position = 0, -300
	halign = center
	valign = center
	}

# TIME HR
label {
    monitor =
    text = cmd[update:1000] date +"%I" # update every 1 seconds
    font_size = 240
    font_family = $font3
    color = $primary

    position = 0, 300
    halign = center
    valign = center
}

# TIME Min
label {
    monitor =
    text = cmd[update:1000] date +"%M" # update every 1 seconds
    font_size = 240
    font_family = $font3
    color = $primary

    position = 0, 40
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%d %B %Y" # update every 60 seconds
    font_size = 40
    font_family = $font3
    color = $primary

    position = -50, 30
    halign = right
    valign = bottom
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A" # update every 60 seconds
    font_size = 40
    font_family = $font3
    color = $primary

    position = 50, 30
    halign = left
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 24
    color = $tertiary
#    onclick = hyprctl switchxkblayout all next

    position = 200, -400
    halign = center
    valign = center
}
